name: Android Build

on: [push]

env:
  GODOT_VERSION: 4.2.2.stable
  EXPORT_NAME: Clawbox

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/godotengine/godot-buildpack/godot:4.2.2.stable-ubuntu22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --export-release "Android" build/android/${{ env.EXPORT_NAME }}.apk --path /github/workspace/clawbox

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: clawbox/build/android/${{ env.EXPORT_NAME }}.apk
