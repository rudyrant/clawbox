name: "Android Export"
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33"

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot .godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF
          cat > .godot/export_credentials.cfg << EOF
          [preset.0]
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Download Godot & Templates
        run: |
          curl -L "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip" -o godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          curl -L "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz" -o templates.tpz
          unzip -q templates.tpz -d temp_templates
          mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Godot Android export
        run: |
          set +e
          mkdir -p build

          echo "--- export_presets.cfg (effective in CI) ---"
          sed -n '1,240p' export_presets.cfg

          echo "--- Control experiment: fresh minimal Android project ---"
          rm -rf /tmp/godot-android-control
          mkdir -p /tmp/godot-android-control
          cat > /tmp/godot-android-control/project.godot << 'EOF'
          ; Engine configuration file.
          ; It's best edited using the editor and not directly,
          ; since the parameters that go here are not all obvious.
          ;
          ; Format:
          ;   [section] ; section goes between []
          ;   param=value ; assign values to parameters

          config_version=5

          [application]
          config/name="AndroidControl"
          run/main_scene="res://main.tscn"
          config/features=PackedStringArray("4.2")
          config/icon="res://icon.svg"

          [rendering]
          renderer/rendering_method="mobile"
          textures/vram_compression/import_etc2_astc=true
          EOF
          cat > /tmp/godot-android-control/main.tscn << 'EOF'
          [gd_scene format=3]

          [node name="Node2D" type="Node2D"]
          EOF
          cat > /tmp/godot-android-control/icon.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128"><rect width="128" height="128" fill="#4f46e5"/></svg>
          EOF
          cat > /tmp/godot-android-control/export_presets.cfg << 'EOF'
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          advanced_options=false
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/control.apk"
          patches=PackedStringArray()
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          gradle_build/min_sdk=""
          gradle_build/target_sdk=""
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=1
          version/name="1.0"
          package/unique_name="com.rudyrant.androidcontrol"
          package/name="AndroidControl"
          package/signed=true
          package/app_category=2
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=false
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          launcher_icons/adaptive_monochrome_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          gesture/swipe_to_dismiss=false
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_data_backup/allow=false
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          permissions/custom_permissions=PackedStringArray()
          xr_features/hand_tracking=0
          xr_features/hand_tracking_frequency=0
          xr_features/passthrough=0
          custom_template/use_custom_build=false
          custom_template/export_format=0
          one_click_deploy/clear_previous_install=false
          package/classify_as_game=true
          graphics/32_bits_framebuffer=true
          EOF
          mkdir -p /tmp/godot-android-control/.godot /tmp/godot-android-control/build
          cat > /tmp/godot-android-control/.godot/export_credentials.cfg << 'EOF'
          [preset.0]
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --path /tmp/godot-android-control --import 2>&1 | tee control-import.log
          control_import_status=${PIPESTATUS[0]}
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --verbose --path /tmp/godot-android-control --export-debug "Android" /tmp/godot-android-control/build/control.apk 2>&1 | tee control-export.log
          control_export_status=${PIPESTATUS[0]}
          echo "Control import exit code: ${control_import_status}"
          echo "Control export exit code: ${control_export_status}"
          if [ "$control_export_status" -eq 0 ]; then
            echo "CONTROL_RESULT=success"
          else
            echo "CONTROL_RESULT=failure"
          fi

          echo "--- Godot import ---"
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --path . --import 2>&1 | tee godot-import.log
          import_status=${PIPESTATUS[0]}
          echo "Godot import exit code: ${import_status}"

          echo "--- Godot Android export ---"
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --verbose --path . --export-debug "Android" build/clawbox.apk 2>&1 | tee godot-export.log
          export_status=${PIPESTATUS[0]}
          echo "Godot export exit code: ${export_status}"

          echo "--- First validation block around control failure ---"
          python - <<'PY'
          from pathlib import Path
          p = Path('control-export.log')
          if p.exists():
              lines = p.read_text(errors='replace').splitlines()
              idx = None
              for i, line in enumerate(lines):
                  if 'Cannot export project with preset "Android" due to configuration errors:' in line:
                      idx = i
                      break
              if idx is not None:
                  for line in lines[max(0, idx - 50):min(len(lines), idx + 30)]:
                      print(line)
          PY

          echo "--- First validation block around project failure ---"
          python - <<'PY'
          from pathlib import Path
          p = Path('godot-export.log')
          if not p.exists():
              print('godot-export.log not found')
              raise SystemExit(0)
          lines = p.read_text(errors='replace').splitlines()
          idx = None
          for i, line in enumerate(lines):
              if 'Cannot export project with preset "Android" due to configuration errors:' in line:
                  idx = i
                  break
          if idx is None:
              print('No generic Android export validation banner found; tailing full export log instead.')
              for line in lines[-200:]:
                  print(line)
          else:
              start = max(0, idx - 80)
              end = min(len(lines), idx + 40)
              for line in lines[start:end]:
                  print(line)
          PY

          if [ "$control_import_status" -ne 0 ]; then
            echo "Failing because control project import failed"
            exit "$control_import_status"
          fi

          if [ "$control_export_status" -ne 0 ]; then
            echo "Failing because control project export failed; classify as workflow/environment-side"
            exit "$control_export_status"
          fi

          if [ "$import_status" -ne 0 ]; then
            echo "Failing because Godot import failed"
            exit "$import_status"
          fi

          if [ "$export_status" -ne 0 ]; then
            echo "Failing because repo project export failed after control succeeded; classify as project-specific"
            exit "$export_status"
          fi

      - name: Verify APK exists
        run: test -s build/clawbox.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android Build
          path: build/clawbox.apk
          if-no-files-found: error
