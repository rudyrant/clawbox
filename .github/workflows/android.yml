name: "Android Export"
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33"

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Configure Godot Editor Settings
          # We write to the specific version-4 settings file
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/debug_keystore = "/home/runner/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF

      - name: Download Godot & Templates
        run: |
          curl -L "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip" -o godot.zip
          unzip godot.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64
          
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable
          curl -L "https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz" -o templates.tpz
          unzip templates.tpz -d temp_templates
          mv temp_templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Patch project.godot for Android SDK path
        run: |
          # Add SDK path to project.godot to ensure it's picked up during headless export
          echo 'export/android/android_sdk_path="/usr/local/lib/android/sdk"' >> project.godot

      - name: Godot Android export
        run: |
          mkdir -p build
          # First ensure everything is imported correctly
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --path . --import --verbose
          # Export to the APK path specified in preset (or override it)
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --verbose --path . --export-debug "Android" build/clawbox.apk

      - name: Verify APK exists
        run: test -s build/clawbox.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android Build
          path: build/clawbox.apk
          if-no-files-found: error
