name: "Android Export"
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download Godot
        run: curl -L https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip -o godot.zip && unzip godot.zip

      - name: Make Godot executable
        run: chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Debug Workspace Structure
        run: |
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          ls -F "${GITHUB_WORKSPACE}"
          echo "Contents of clawbox/ folder:"
          ls -F "${GITHUB_WORKSPACE}/clawbox"

      - name: Run Editor Headless (Lint Check)
        run: ./Godot_v4.2.2-stable_linux.x86_64 --headless --quit --check-only-update-resources --path "${GITHUB_WORKSPACE}/clawbox"

      - name: Basic Scene Boot Test (Title Screen)
        run: ./Godot_v4.2.2-stable_linux.x86_64 --headless --quit --main-scene scenes/title_screen.tscn --path "${GITHUB_WORKSPACE}/clawbox"

  export:
    needs: lint_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore ~/.android/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Godot Android export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          relative_project_path: ./clawbox/
          archive_output: true
          export_debug: true
          use_preset_export_path: true
          debug_keystore_path: ~/.android/debug.keystore

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android Build
          path: ~/.local/share/godot/archives/*